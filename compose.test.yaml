version: '3'
services:
  ta_example:
    tty: true
    build: ./docker
    ports:
      - "443:443"
    volumes:
      - ./ta:/ta
      - ./core:/core
      - ./test:/test
      - /dev:/dev
    working_dir: /ta/example
    command: bash -c 'mount -o remount,exec /dev && ego-go build -buildvcs=false -trimpath=true && ego sign example && source /test/issue_service.sh && sleep 10 && ego run example'
    privileged: true
    environment:
      - OE_SIMULATION=0
    env_file:
      - test/env/ta.env
      - test/env/common.env
    restart: unless-stopped

  ttp:
    build: ./docker
    ports:
      - "8000:8000"
    volumes:
      - ./ttp:/ttp
      - ./core:/core
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /ttp/serv
    command: bash -c 'go mod tidy && go run main.go'
    env_file:
      - test/env/ttp.env
      - test/env/common.env
    privileged: true
    tty: true

  do:
    image: golang:latest
    ports:
      - "53:53/udp"
    volumes:
      - ./domain-owner:/serv/domain-owner # Avoid to use /opt
      - ./core:/core
    working_dir: /serv/domain-owner/example
    command: bash -c 'go mod tidy && go run main.go'
    environment:
      - ZONE=test.ochano.co
      - SELF_IP=127.0.0.1
      - CA_NAME=letsencrypt.org
    profiles:
      - strict

  ngrok:
    image: ngrok/ngrok:latest
    restart: unless-stopped
    command:
      - "start"
      - "--all"
      - "--config"
      - "/etc/ngrok.yaml"
    ports:
      - 4040:4040
    volumes:
      - ./test/ngrok.yaml:/etc/ngrok.yaml
