version: '3'
services:
  ta_example:
    tty: true
    build: ./docker
    ports:
      - "443:443"
    volumes:
      - ./ta:/ta
      - ./core:/core
      - /dev:/dev
    restart: unless-stopped
    working_dir: /ta/example
    command: bash -c 'mount -o remount,exec /dev && ego-go build -buildvcs=false -trimpath=true && ego sign example && ego run example'
    privileged: true
    environment:
      - OE_SIMULATION=1
    env_file:
      - test/env/ta.env

  ttp:
    build: ./docker
    ports:
      - "8000:8000"
    volumes:
      - ./ttp:/ttp
      - ./core:/core
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /ttp/serv
    command: bash -c 'go mod tidy && go run main.go'
    env_file:
      - test/env/ttp.env
    privileged: true
    tty: true
    environment:
      - RA_WEBS_TTP_TOKEN="thisisra-websadmintoken"

  do:
    image: golang:latest
    ports:
      - "53:53/udp"
    volumes:
      - ./domain-owner:/serv/domain-owner # Avoid to use /opt
      - ./core:/core
    working_dir: /serv/domain-owner/example
    command: bash -c 'go mod tidy && go run main.go'
    environment:
      - ZONE=test.ochano.co
      - SELF_IP=127.0.0.1
      - CA_NAME=letsencrypt.org
    profiles:
      - strict
