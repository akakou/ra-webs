<link rel="stylesheet" href="https://unpkg.com/mvp.css">
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<main>
    <div id="root"></div>
    <script type="text/babel">
        const useState = React.useState;
        const useEffect = React.useEffect;

        const VALID_MESSAGE = "It will be back...after 5 sec..."
        const INVALID_MESSAGE = "The verification is failed."


        const TableCompornent = ({ logs }) => {
            const rows = logs.map((server, index) =>
                <tr key={index}>
                    <td>
                        {index + 1}
                    </td>
                    <td>{server.domain}</td>
                    <td>{server.edges.code.repository}</td>
                    <td>{server.edges.code.commit_id}</td>
                    <td>{server.edges.code.unique_id}</td>
                    <td><button
                        onClick={(event) => {
                            const url = server.edges.code.repository + '/tree/' + server.edges.code.commit_id
                            location.href = url
                        }}
                    >hello</button></td>
                </tr>
            );

            return (
                <table>
                    <thead>
                        <tr>
                            <th>Index</th>
                            <th>Domain</th>
                            <th>Repository</th>
                            <th>Commit_ID</th>
                            <th>Unique ID</th>
                            <th>Repository Link</th>
                        </tr>
                    </thead>
                    <tbody>
                        {rows}
                    </tbody>
                </table>
            )
        }

        const App = () => {
            const [isValid, setIsValid] = useState(false);
            const [logs, setLogs] = useState([
                {
                    "id": 1,
                    "domain": "example.com",
                    "public_key": "",
                    "quote": "",
                    "has_activated": true,
                    "edges": {
                        "code": {
                            "id": 1,
                            "repository": "https://github.com/akakou/ra-webs",
                            "commit_id": "bfb3076e0d1ec44d0b852cec93ccb068b4e8f0c2",
                            "unique_id": "",
                            "is_active": true,
                            "edges": {}
                        }
                    }
                }
            ]);

            return (
                <div>
                    <h1>RA-WEBs: TEE Verification Service</h1>
                    <h2>Attestation Result</h2>

                    <h3>Result: </h3>
                    <bold>{isValid ? 'valid' : 'invalid'}</bold>

                    <h3>Message: </h3>
                    <p>{isValid ? VALID_MESSAGE : INVALID_MESSAGE}</p>

                    <br />

                    <h2>Logs</h2>
                    <TableCompornent logs={logs} />
                </div>
            );
        }

        const container = document.getElementById('root')
        const root = ReactDOM.createRoot(container)
        root.render(<App />)
    </script>

    <script>


    </script>
</main>
