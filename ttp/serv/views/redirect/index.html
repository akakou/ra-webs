<link rel="stylesheet" href="https://unpkg.com/mvp.css">
<script src="https://cdn.jsdelivr.net/npm/axios@1.6.7/dist/axios.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

<main>
    <div id="root"></div>
    <script type="text/babel">
        const useState = React.useState;
        const useEffect = React.useEffect;

        const VALID_MESSAGE = "It will be back...after 5 sec..."
        const VALID_AND_STOP_MESSAGE = (<div>Go <a href={document.referrer}>back</a></div>)
        const INVALID_MESSAGE = "The verification is failed."


        const checkOneValidity = x => !x.edges.violation

        const checkAllValidity = (data) => {
            if (!data.length) return false

            const reduced = data.reduce((accumulator, current) => accumulator && checkOneValidity(current), true)
            const last_activated = data[data.length - 1].has_activated
            return last_activated && reduced
        }

        const TableCompornent = ({ logs }) => {
            const rows = logs.map((server, index) =>
                <tr key={index}>
                    <td>
                        {index + 1}
                    </td>
                    <td>{server.domain}</td>
                    <td>{server.edges.code.repository}</td>
                    <td>{server.edges.code.commit_id}</td>
                    <td>{server.edges.code.unique_id}</td>
                    <td><a
                        href={`${server.edges.code.repository}/tree/${server.edges.code.commit_id}`}
                    >Go to Repo</a></td>
                </tr>
            );

            return (
                <table>
                    <thead>
                        <tr>
                            <th>Index</th>
                            <th>Domain</th>
                            <th>Repository</th>
                            <th>Commit_ID</th>
                            <th>Unique ID</th>
                            <th>Repository Link</th>
                        </tr>
                    </thead>
                    <tbody>
                        {rows}
                    </tbody>
                </table>
            )
        }

        const App = () => {
            const [isValid, setIsValid] = useState(false);
            const [logs, setLogs] = useState([]);
            const [message, setMessage] = useState(INVALID_MESSAGE);
            const [hostname, setHostname] = useState("");


            useEffect(async () => {
                const referrer = new URL(document.referrer);
                setHostname(referrer.hostname)

                const resp = await axios.get(`/api/server/${referrer.hostname}`)
                console.log(resp)

                const v = resp.data.length > 0 && checkAllValidity(resp.data)
                setLogs(resp.data)
                setIsValid(v)
                setMessage(v ? VALID_MESSAGE : INVALID_MESSAGE)

                if (v) {
                    setTimeout(() => {
                        if (localStorage.stopAutoRedirect == 'true') {
                            setMessage(VALID_AND_STOP_MESSAGE)
                            return
                        }

                        window.location = document.referrer

                    }, 5000)
                }
            }, []);

            return (
                <div>
                    <h1>RA-WEBs: TEE Verification Service</h1>
                    <h2>Attestation Result</h2>

                    <h3>Result: </h3>
                    <bold>{isValid ? 'valid' : 'invalid'}</bold>

                    <h3>Message: </h3>
                    <p>{message}</p>

                    <input
                        type="checkbox"
                        name="subscribe"
                        defaultChecked={localStorage.stopAutoRedirect == 'true'}
                        onChange={e => {
                            localStorage.stopAutoRedirect = e.target.checked
                        }}
                    />
                    <label for="autoredirect">Do not redirect back automatically</label>


                    <br />

                    <h2>Logs</h2>
                    <TableCompornent logs={logs} />

                    <br />
                    <button onClick={e => window.location = "https://crt.sh/?q=" + hostname}>See certificate logs (on crt.sh)</button>
                </div>
            );
        }

        const container = document.getElementById('root')
        const root = ReactDOM.createRoot(container)
        root.render(<App />)
    </script>

    <script>


    </script>
</main>
